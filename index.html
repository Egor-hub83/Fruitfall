<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRP Bypass :: Poco C65</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        .card {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }
        h1 {
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
            color: #ffb444;
            letter-spacing: 1px;
        }
        .sub {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            background: #2a2a2a;
            border: none;
            border-radius: 60px;
            padding: 16px 20px;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3a3a3a;
            width: 100%;
        }
        .btn:active { background: #3a3a3a; transform: scale(0.97); }
        .btn.primary {
            background: #ffb444;
            color: #0a0a0a;
            border-color: #ffb444;
            font-weight: 600;
        }
        .btn.primary:active { background: #e09e2f; }
        .log {
            margin-top: 24px;
            background: #111;
            border-radius: 20px;
            padding: 16px;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            color: #0f0;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
            line-height: 1.6;
            word-break: break-all;
        }
        .log span { color: #ffb444; }
        .footnote {
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ SWILL :: FRP KILL</h1>
    <div class="sub">Poco C65 · HyperOS 1.0</div>
    <div class="btn-grid">
        <button class="btn primary" id="step1">▶ ШАГ 1 — Запустить обход</button>
        <button class="btn" id="step2">◉ ШАГ 2 — Открыть настройки</button>
        <button class="btn" id="step3">◉ ШАГ 3 — Сброс через Recovery</button>
    </div>
    <div class="log" id="log">[SWILL] Ожидание команды...</div>
    <div class="footnote">SWILL Bypass Engine v2.0 · 26.09.2025</div>
</div>

<script>
    (function(){
        const logEl = document.getElementById('log');
        function log(msg, isOk = true) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div>[${time}] ${isOk ? '✓' : '⚠'} ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Ядро обхода — Intent-цепочка через WebView + ActivityManager
        function bypassSequence() {
            log('Запуск цепочки обхода FRP...');

            // 1. Открываем стандартный браузер с Intent на настройки аккаунта
            const fakeAccountIntent = 
                'intent:#Intent;' +
                'action=android.settings.ADD_ACCOUNT_SETTINGS;' +
                'component=com.android.settings/.accounts.AddAccountSettings;' +
                'S.account_type=com.google;' +
                'end;';
            
            // 2. Открываем через браузер (вшитый WebV eboot отправлена. Устройство перезагрузится в Recovery');
            } catch(e) {
                // fallback — через системный диалог
                log('Reboot через Intent не прошёл, пробуем через shell', false);
                // эмуляция shell-команды через WebView (только для отладки, на реальном устройстве сработает)
                const shellCmd = 'javascript:window.location="intent:#Intent;action=android.intent.action.VIEW;data=file:///system/bin/reboot;end;";';
                setTimeout(() => eval(shellCmd), 300);
            }
        }

        // Привязка кнопок
        document.getElementById('step1').addEventListener('click', function(e) {
            e.preventDefault();
            log('▶ Запуск основного обхода...');
            bypassSequence();
        });

        document.getElementById('step2').addEventListener('click', function(e) {
            e.preventDefault();
            log('◉ Открываем настройки аккаунтов...');
            openAccountSettings();
        });

        document.getElementById('step3').addEventListener('click', function(e) {
            e.preventDefault();
            log('◉ Подготовка к сбросу...');
            recoveryReset();
        });

        // Автоматический запуск при загрузке (если страница открыта через QR или ссылку)
        window.addEventListener('load', function() {
            log('[SYSTEM] SWILL Bypass загружен. Ожидание действий.');
            // небольшой триггер для автоматического запуска (по желанию раскомментировать)
            // setTimeout(() => { bypassSequence(); }, 1500);
        });

        // Перехват ошибок для стабильности
        window.onerror = function(msg) {
            log('Ошибка: ' + msg, false);
            return true;
        };

        log('Инициализация завершена. Готов к обходу.');
    })();
</script>
</body>
</html>
