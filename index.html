<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Collector - Slow & Fast</title>
    <style>
        * {
            user-select: none;
            touch-action: none;
        }
        body {
            background: #1a472a;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', monospace;
            padding: 8px;
        }
        .game-container {
            background: #2b1e0f;
            border-radius: 20px;
            padding: 10px 8px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            background: #fef7e0;
            cursor: none;
            width: 100%;
            height: auto;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 6px 12px;
            background: #3e2a1f;
            border-radius: 40px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .stats {
            display: flex;
            gap: 12px;
            background: #1f1409;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        .stats span {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .score { color: #ffd966; }
        .lives { color: #ff8a7a; }
        .best { color: #aaffdd; }
        .combo {
            background: #ffb347;
            color: #2c1a0c;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }
        button {
            background: #f4a261;
            border: none;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(1px);
        }
        @media (max-width: 500px) {
            .stats span { font-size: 0.9rem; }
            .combo { font-size: 0.7rem; padding: 2px 8px; }
            button { font-size: 0.8rem; padding: 3px 12px; }
            .info-panel { gap: 6px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="340"></canvas>
        <div class="info-panel">
            <div class="stats">
                <span class="score">🍎<span id="scoreValue">0</span></span>
                <span class="lives">❤️<span id="livesValue">3</span></span>
                <span class="best">🏆<span id="bestValue">0</span></span>
            </div>
            <div class="combo" id="comboDisplay">⚡0x</div>
            <button id="restartButton">🔄</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // размеры
        const CW = 500, CH = 340;
        const CART_W = 70, CART_H = 14;
        let cartX = (CW - CART_W) / 2;
        const CART_Y = CH - CART_H - 4;
        
        let items = [];
        let score = 0;
        let lives = 3;
        let bestScore = 0;
        let gameRunning = false;     // игра не запущена до старта
        let gameStarted = false;     // флаг, что было нажато "Старт"
        
        let baseFallSpeed = 2.2;
        let currentGlobalSpeed = baseFallSpeed;
        let slowMotionTimer = null;
        let slowMotionActive = false;
        let slowMotionStartTime = 0;
        let slowMotionDuration = 3000;
        
        let framesCounter = 0;
        let spawnDelayFrames = 30;
        const MIN_SPAWN = 22;
        const MAX_SPAWN = 42;
        
        let comboCounter = 0;
        
        // UI элементы
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const bestSpan = document.getElementById('bestValue');
        const comboDisplay = document.getElementById('comboDisplay');
        const restartBtn = document.getElementById('restartButton');
        
        // рекорд
        try {
            const saved = localStorage.getItem('collectorBest');
            if(saved && !isNaN(parseInt(saved))) bestScore = parseInt(saved);
            bestSpan.innerText = bestScore;
        } catch(e) {}
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            livesSpan.innerText = lives;
            if(score > bestScore && gameStarted) {
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                try { localStorage.setItem('collectorBest', bestScore); } catch(e) {}
            }
            let comboText = comboCounter > 0 ? `x${comboCounter}` : `0x`;
            comboDisplay.innerText = `🍬${comboText}`;
        }
        
        function resetCombo() {
            comboCounter = 0;
            updateUI();
        }
        
        function addScoreWithCombo(basePoints) {
            let multiplier = 1 + Math.floor(comboCounter / 2);
            if(multiplier > 5) multiplier = 5;
            let gained = basePoints * multiplier;
            score += gained;
            updateUI();
        }
        
        function activateSlowMotion(durationMs) {
            if(slowMotionTimer) clearTimeout(slowMotionTimer);
            
            if(!slowMotionActive) {
                currentGlobalSpeed = baseFallSpeed * 0.45;
                slowMotionActive = true;
            } else {
                currentGlobalSpeed = baseFallSpeed * 0.45;
            }
            
            slowMotionStartTime = Date.now();
            slowMotionDuration = durationMs;
            
            slowMotionTimer = setTimeout(() => {
                currentGlobalSpeed = baseFallSpeed;
                slowMotionActive = false;
                slowMotionTimer = null;
            }, durationMs);
        }
        
        function getSlowMotionPercent() {
            if(!slowMotionActive) return 0;
            const elapsed = Date.now() - slowMotionStartTime;
            const remaining = Math.max(0, slowMotionDuration - elapsed);
            return (remaining / slowMotionDuration) * 100;
        }
        
        function addLife() {
            if(lives < 10) {
                lives++;
                updateUI();
            }
        }
        
        function updateDifficulty() {
            if(!gameStarted) return;
            let newBase = 2.2 + (Math.floor(score / 300)) * 0.4;
            if(newBase > 4.8) newBase = 4.8;
            baseFallSpeed = newBase;
            if(!slowMotionActive) currentGlobalSpeed = baseFallSpeed;
            else currentGlobalSpeed = baseFallSpeed * 0.45;
            
            let newSpawn = Math.max(MIN_SPAWN, MAX_SPAWN - Math.floor(score / 160));
            spawnDelayFrames = Math.min(MAX_SPAWN, newSpawn);
        }
        
        function spawnItem() {
            if(!gameRunning || !gameStarted) return;
            const rand = Math.random();
            let type = 'fruit';
            
            if(rand < 0.25) {
                type = 'bomb';
            } else if(rand < 0.37) {
                type = 'heart';
            } else if(rand < 0.52) {
                type = 'slow_gem';
            } else {
                type = 'fruit';
            }
            
            const randX = 8 + Math.random() * (CW - 16);
            let individualSpeed = currentGlobalSpeed;
            
            if(type === 'bomb') {
                let extra = 1 + Math.floor(score / 700);
                if(extra > 1.6) extra = 1.6;
                individualSpeed = currentGlobalSpeed + extra * 0.6;
            } else if(type === 'heart') {
                individualSpeed = currentGlobalSpeed * 0.8;
            } else if(type === 'slow_gem') {
                individualSpeed = currentGlobalSpeed * 0.9;
            }
            
            items.push({
                x: randX, y: -10, 
                type: type, 
                speed: individualSpeed, 
                radius: 8
            });
        }
        
        function catchItem(item) {
            if(item.type === 'fruit') {
                addScoreWithCombo(10);
                comboCounter++;
                updateUI();
            } 
            else if(item.type === 'slow_gem') {
                addScoreWithCombo(15);
                comboCounter++;
                updateUI();
                activateSlowMotion(3000);
            }
            else if(item.type === 'heart') {
                addScoreWithCombo(20);
                addLife();
                comboCounter++;
                updateUI();
            }
            else if(item.type === 'bomb') {
                lives--;
                updateUI();
                resetCombo();
                if(lives <= 0) {
                    gameRunning = false;
                    lives = 0;
                    updateUI();
                }
            }
        }
        
        function updateItems() {
            if(!gameRunning || !gameStarted) return;
            const cartRect = { x: cartX, y: CART_Y, w: CART_W, h: CART_H };
            const newItems = [];
            for(let item of items) {
                item.y += item.speed;
                const itemRect = { x: item.x - item.radius, y: item.y - item.radius, w: item.radius*2, h: item.radius*2 };
                if(itemRect.x < cartRect.x + cartRect.w && itemRect.x + itemRect.w > cartRect.x &&
                   itemRect.y < cartRect.y + cartRect.h && itemRect.y + itemRect.h > cartRect.y) {
                    catchItem(item);
                    continue;
                }
                if(item.y - item.radius > CH) {
                    if((item.type === 'fruit' || item.type === 'slow_gem' || item.type === 'heart') && gameRunning) {
                        resetCombo();
                    }
                    continue;
                }
                newItems.push(item);
            }
            items = newItems;
        }
        
        function handleSpawning() {
            if(!gameRunning || !gameStarted) return;
            framesCounter++;
            if(framesCounter >= spawnDelayFrames) {
                framesCounter = 0;
                spawnItem();
                if(Math.random() < 0.3 && items.length < 10) spawnItem();
            }
        }
        
        // управление
        function handleMove(clientX) {
            if(!gameRunning || !gameStarted) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            let canvasX = (clientX - rect.left) * scaleX;
            canvasX = Math.min(Math.max(canvasX, CART_W/2), CW - CART_W/2);
            cartX = canvasX - CART_W/2;
            if(cartX < 0) cartX = 0;
            if(cartX + CART_W > CW) cartX = CW - CART_W;
        }
        
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if(e.touches[0]) handleMove(e.touches[0].clientX);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(e.touches[0]) handleMove(e.touches[0].clientX);
        });
        canvas.addEventListener('click', (e) => handleMove(e.clientX));
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // СТАРТ ИГРЫ
        function startGame() {
            if(gameStarted) return;
            gameStarted = true;
            gameRunning = true;
            items = [];
            score = 0;
            lives = 3;
            comboCounter = 0;
            baseFallSpeed = 2.2;
            currentGlobalSpeed = baseFallSpeed;
            if(slowMotionTimer) {
                clearTimeout(slowMotionTimer);
                slowMotionTimer = null;
            }
            slowMotionActive = false;
            framesCounter = 0;
            spawnDelayFrames = 30;
            cartX = (CW - CART_W)/2;
            updateUI();
            updateDifficulty();
        }
        
        // Перезапуск (после Game Over)
        function restartGame() {
            if(!gameStarted) {
                startGame();
                return;
            }
            gameRunning = true;
            items = [];
            score = 0;
            lives = 3;
            comboCounter = 0;
            baseFallSpeed = 2.2;
            currentGlobalSpeed = baseFallSpeed;
            if(slowMotionTimer) {
                clearTimeout(slowMotionTimer);
                slowMotionTimer = null;
            }
            slowMotionActive = false;
            framesCounter = 0;
            spawnDelayFrames = 30;
            cartX = (CW - CART_W)/2;
            updateUI();
            updateDifficulty();
        }
        
        restartBtn.addEventListener('click', () => {
            if(!gameStarted) {
                startGame();
            } else {
                restartGame();
            }
        });
        
        // отрисовка со стартовым меню
        function draw() {
            ctx.clearRect(0, 0, CW, CH);
            ctx.fillStyle = '#fdf8e7';
            ctx.fillRect(0, 0, CW, CH);
            
            // сетка
            ctx.strokeStyle = '#e9dfb0';
            ctx.lineWidth = 0.5;
            for(let i=0; i<CW; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CH);
                ctx.stroke();
                ctx.moveTo(0, i%CH);
                ctx.lineTo(CW, i%CH);
                ctx.stroke();
            }
            
            // предметы (только если игра активна)
            if(gameStarted && gameRunning) {
                for(let item of items) {
                    if(item.type === 'fruit') {
                        const grad = ctx.createRadialGradient(item.x-2, item.y-2, 2, item.x, item.y, 9);
                        grad.addColorStop(0, '#ff7e40');
                        grad.addColorStop(1, '#e63e10');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#583c1a';
                        ctx.beginPath();
                        ctx.arc(item.x-2, item.y-3, 1.8, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#fff9cf';
                        ctx.beginPath();
                        ctx.arc(item.x-3, item.y-4, 1, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if(item.type === 'slow_gem') {
                        ctx.fillStyle = '#4a9eff';
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#ffffff';
                        ctx.font = `${item.radius+4}px monospace`;
                        ctx.fillText('❄️', item.x-7, item.y+5);
                        ctx.fillStyle = '#c8e7ff';
                        ctx.beginPath();
                        ctx.arc(item.x-2, item.y-3, 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if(item.type === 'heart') {
                        ctx.fillStyle = '#ff4466';
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#ffffff';
                        ctx.font = `${item.radius+4}px monospace`;
                        ctx.fillText('❤️', item.x-7, item.y+5);
                        ctx.fillStyle = '#ffaacc';
                        ctx.beginPath();
                        ctx.arc(item.x-2, item.y-3, 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if(item.type === 'bomb') {
                        ctx.fillStyle = '#2b2b2b';
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#a51f1f';
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius-3, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#ff884d';
                        ctx.font = `${item.radius+3}px monospace`;
                        ctx.fillText('💣', item.x-6, item.y+5);
                    }
                }
            }
            
            // тележка (всегда рисуем, даже в меню)
            ctx.fillStyle = '#bd7a3a';
            ctx.fillRect(cartX, CART_Y, CART_W, CART_H);
            ctx.fillStyle = '#e7a05e';
            ctx.fillRect(cartX+5, CART_Y-3, CART_W-10, 5);
            ctx.fillStyle = '#4f2f10';
            ctx.fillRect(cartX+12, CART_Y+3, 8, 7);
            ctx.fillRect(cartX+CART_W-20, CART_Y+3, 8, 7);
            
            // полоска замедления
            if(slowMotionActive && gameStarted && gameRunning) {
                const percent = getSlowMotionPercent();
                const barWidth = 120;
                const barHeight = 10;
                const barX = CW - barWidth - 10;
                const barY = 12;
                
                ctx.fillStyle = '#334455aa';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                
                const fillWidth = (percent / 100) * barWidth;
                const gradient = ctx.createLinearGradient(barX, barY, barX + barWidth, barY);
                gradient.addColorStop(0, '#88ccff');
                gradient.addColorStop(1, '#3399ff');
                ctx.fillStyle = gradient;
                ctx.fillRect(barX, barY, fillWidth, barHeight);
                
                ctx.strokeStyle = '#ffffffcc';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barWidth, barHeight);
                
                ctx.font = "bold 9px monospace";
                ctx.fillStyle = "#aaddff";
                ctx.fillText("❄️ ЗАМЕДЛЕНИЕ", barX, barY - 3);
            }
            
            // подсказки
            ctx.font = "9px monospace";
            ctx.fillStyle = "#8b6946";
            ctx.fillText("❄️=замедление  ❤️=+жизнь", CW-150, CH-8);
            
            // ========== СТАРТОВОЕ МЕНЮ ==========
            if(!gameStarted) {
                ctx.globalAlpha = 0.92;
                ctx.fillStyle = '#1b2c1f';
                ctx.fillRect(0, 0, CW, CH);
                ctx.globalAlpha = 1;
                
                // заголовок
                ctx.font = 'bold 28px "Segoe UI", monospace';
                ctx.fillStyle = '#ffd966';
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#00000080';
                ctx.fillText('🍎 COLLECTOR', CW/2-100, CH/2-60);
                
                // надпись "Готов(а)?" 
                ctx.font = '18px monospace';
                ctx.fillStyle = '#ffe0aa';
                ctx.fillText('Готов(а) ?', CW/2-45, CH/2-15);
                
                // кнопка старт (нарисованная)
                const btnX = CW/2 - 55;
                const btnY = CH/2 + 15;
                const btnW = 110;
                const btnH = 38;
                
                ctx.fillStyle = '#f4a261';
                ctx.shadowBlur = 3;
                ctx.fillRect(btnX, btnY, btnW, btnH);
                ctx.fillStyle = '#2d1c0c';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('СТАРТ', btnX + 28, btnY + 27);
                ctx.strokeStyle = '#ffffffaa';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(btnX, btnY, btnW, btnH);
                
                // проверка нажатия на кнопку (через координаты клика по canvas)
                // сохраняем последние координаты клика для проверки
                canvas.startButtonRect = { x: btnX, y: btnY, w: btnW, h: btnH };
                
                ctx.shadowBlur = 0;
                
                // маленькая подпись
                ctx.font = '10px monospace';
                ctx.fillStyle = '#bbaa77';
                ctx.fillText('лови фрукты, ❄️ замедление, ❤️ жизни', CW/2-130, CH-20);
            }
            else if(!gameRunning) {
                // Game Over экран
                ctx.globalAlpha = 0.85;
                ctx.fillStyle = '#1b1b2c';
                ctx.fillRect(0, 0, CW, CH);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 24px monospace';
                ctx.fillStyle = '#ffb347';
                ctx.fillText('GAME OVER', CW/2-85, CH/2-15);
                ctx.font = '12px monospace';
                ctx.fillStyle = '#ffdd99';
                ctx.fillText('нажми 🔄', CW/2-35, CH/2+20);
            }
        }
        
        // обработка клика по стартовой кнопке (нарисованной)
        canvas.addEventListener('click', (e) => {
            if(!gameStarted && canvas.startButtonRect) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                const btn = canvas.startButtonRect;
                if(mouseX >= btn.x && mouseX <= btn.x + btn.w && mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                    startGame();
                }
            }
        });
        
        function gameUpdate() {
            if(gameStarted && gameRunning) {
                updateDifficulty();
                handleSpawning();
                updateItems();
            }
            draw();
            requestAnimationFrame(gameUpdate);
        }
        
        // инициализация: игра не запущена, но тележка на месте
        cartX = (CW - CART_W)/2;
        gameStarted = false;
        gameRunning = false;
        updateUI();
        gameUpdate();
    })();
</script>
</body>
</html>
